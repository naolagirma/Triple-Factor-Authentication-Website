<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Setup Authenticator - {{ username }}</title>
    <style>
        body {
            font-family: monospace;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #16213e;
            padding: 2em;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
        }
        .card img {
            background: white;
            padding: 12px;
            border-radius: 8px;
        }
        .secret {
            background: #0f3460;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            word-break: break-all;
            margin-top: 1em;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Scan with Authenticator</h2>
        <p>User: <strong>{{ username }}</strong></p>
        <img src="data:image/png;base64,{{ qr_code }}" alt="QR Code" width="250">
        <div class="secret">
            <small>Manual entry key:</small><br>
            {{ totp_secret }}
        </div>
    </div>
</body>
</html>
